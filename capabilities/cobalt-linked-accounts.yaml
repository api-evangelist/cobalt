        destructive: false
        idempotent: true
      call: cobalt-linked-accounts.getlinkedaccount
      with:
        linked_account_id: tools.linked_account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: cobalt-delete-linked-account
