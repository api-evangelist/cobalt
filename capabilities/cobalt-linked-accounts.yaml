        linked_account_id: tools.linked_account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: cobalt-migrate-token-linked-account
      description: Cobalt Migrate Token for Linked Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
