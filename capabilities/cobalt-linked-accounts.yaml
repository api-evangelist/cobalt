      operations:
      - name: getlinkedaccount
        method: GET
        description: Cobalt Get Linked Account by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: linked_account_id
          in: path
