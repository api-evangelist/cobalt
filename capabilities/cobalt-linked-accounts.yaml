      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cobalt-upsert-linked-account
      description: Cobalt Upsert Linked Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cobalt-linked-accounts.upsertlinkedaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cobalt-get-linked-account-id
