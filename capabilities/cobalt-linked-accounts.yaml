        description: Cobalt Delete Linked Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: linked_account_id
          in: path
          type: string
          description: The unique identifier of the linked account.
          required: true
